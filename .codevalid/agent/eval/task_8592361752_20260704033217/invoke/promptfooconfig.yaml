# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Agent eval — invoke (breakdown task_8592361752_20260704033217)"

prompts:
  - "{{ user_message }}"

providers:
  - file://providers.yaml

defaultTest:
  options:
    provider: file://../../shared/judge_provider.yaml
    rubricPrompt: file://../../shared/rubric_prompt.json
  assert:
    - type: llm-rubric
      value: "{{ rubric }}"

tests:
  - description: "Happy Path - Delivered Order Refund"
    vars:
      user_message: "Please process a refund for order ORD-12345"
      rubric: |
        - calls lookup_order with the order ID before any other action - calls refund_order after confirming order status is delivered - responds with a message indicating refund was successful - does not skip the order status check - provides a customer-facing final message
      scenario_type: "happy_path"
      expected_tools: '["lookup_order", "refund_order"]'
      precondition:
        {
                "hints": [
                        "Order ORD-12345 exists in system with status 'delivered'"
                ]
        }

  - description: "Happy Path - Processing Order Refund Rejection"
    vars:
      user_message: "I need a refund for order ORD-54321"
      rubric: |
        - calls lookup_order with the order ID - does not call refund_order - responds explaining refund is not allowed - mentions order is still processing as the reason - provides accurate order status information to customer
      scenario_type: "happy_path"
      expected_tools: '["lookup_order"]'
      precondition:
        {
                "hints": [
                        "Order ORD-54321 exists in system with status 'processing'"
                ]
        }

  - description: "Missing Information - No Order ID Provided"
    vars:
      user_message: "I want to request a refund"
      rubric: |
        - asks user for the order ID - does not attempt to call lookup_order without an order ID - does not call refund_order - requests missing information politely
      scenario_type: "missing_info"

  - description: "Edge Case - Invalid Order ID Too Short"
    vars:
      user_message: "Please refund order AB"
      rubric: |
        - calls lookup_order with the provided order ID - reports the error about invalid order ID - does not call refund_order - does not invent or guess order status
      scenario_type: "edge_case"
      expected_tools: '["lookup_order"]'
      precondition:
        {
                "hints": [
                        "Order ID input is less than 3 characters"
                ]
        }

  - description: "Edge Case - Order Not Found"
    vars:
      user_message: "Process refund for order NONEXISTENT-999"
      rubric: |
        - calls lookup_order with the provided order ID - reports that the order was not found - does not call refund_order - does not fabricate order information
      scenario_type: "edge_case"
      expected_tools: '["lookup_order"]'
      precondition:
        {
                "hints": [
                        "Order NONEXISTENT-999 does not exist in system"
                ]
        }

  - description: "Validation - Must Call Lookup Before Refund"
    vars:
      user_message: "Refund my order ORD-11111 immediately"
      rubric: |
        - calls lookup_order first before any refund action - determines order status from lookup_order result before proceeding - calls refund_order only after confirming delivered status - follows correct tool call sequence
      scenario_type: "validation"
      expected_tools: '["lookup_order", "refund_order"]'
      precondition:
        {
                "hints": [
                        "Order ORD-11111 exists in system with status 'delivered'"
                ]
        }

  - description: "Tool Selection - Correct Tool Sequence"
    vars:
      user_message: "Can I get a refund for order ORD-78901?"
      rubric: |
        - calls lookup_order to check order status - does not call refund_order when status is not delivered - makes tool decisions based on actual lookup_order response - uses lookup_order result to determine next action
      scenario_type: "tool_selection"
      expected_tools: '["lookup_order"]'
      precondition:
        {
                "hints": [
                        "Order ORD-78901 exists in system with status 'shipped' or 'processing'"
                ]
        }
